[platformio]
default_envs = uno

; ── Arduino Uno R3 (production target) ───────────────────────────────────────
[env:uno]
platform  = atmelavr
board     = uno
framework = arduino

lib_deps =
    feilipu/FreeRTOS@^11.1.0
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    claws/BH1750@^1.3.0

monitor_speed = 115200

build_flags =
    -D configUSE_MUTEXES=1
    -D configMINIMAL_STACK_SIZE=92
    -std=gnu++17

test_framework = unity

; ── Native (unit tests — no hardware needed) ─────────────────────────────────
[env:native]
platform = native

build_flags =
    -std=c++17

test_framework = unity
